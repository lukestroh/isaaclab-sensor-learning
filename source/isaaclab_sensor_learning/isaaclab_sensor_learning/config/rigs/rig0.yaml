name: "rig_0"
description: "Initial capture rig for tree dataset"

sensors:
  - name: "tof0"
    model: "vl53l8cx"
    sensor_type: "tof"
    transform:
      parent: "rig_base"
      position:
        x: 0.0
        y: 0.0
        z: 0.0
      orientation:
        qx: 0.0
        qy: 0.0
        qz: 0.0
        qw: 1.0

